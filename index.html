<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RadarSim</title>

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="spinner"></div>
        <h1>RadarSim</h1>
        <p>Loading map data...</p>
    </div>

    <!-- Sidebar Toggle -->
    <button id="sidebarToggle">☰</button>

    <!-- Sidebar -->
    <div id="sidebar">

        <h2>RadarSim</h2>

        <div class="section">
            <h3>Selected Radar</h3>
            <p id="selectedRadar">KPAH - Paducah</p>
        </div>

        <div class="section">
            <h3>Active Warnings</h3>
            <p id="warningCount">0</p>
        </div>

        <div class="section">
            <h3>Reports</h3>
            <p id="reportCount">0</p>
        </div>

        <button id="settingsBtn">
            Settings
        </button>

    </div>

    <!-- Settings Panel -->
    <div id="settingsPanel">

        <h3>Settings</h3>

        <label>
            <input type="checkbox" id="showCities" checked>
            Show Cities
        </label>

        <label>
            <input type="checkbox" id="showRivers" checked>
            Show Rivers
        </label>

        <label>
            <input type="checkbox" id="showStates" checked>
            Show State Borders
        </label>

        <label>
            <input type="checkbox" id="showHighways" checked>
            Show Highway Labels
        </label>

    </div>

    <!-- Map -->
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>

</body>
</html>
